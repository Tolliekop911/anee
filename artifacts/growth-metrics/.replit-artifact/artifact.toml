kind = "web"
previewPath = "/"
title = "GrowthMetrics"
version = "1.0.0"
id = "artifacts/growth-metrics"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25872

[services.development]
run = "pnpm --filter @workspace/growth-metrics run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/growth-metrics", "run", "build" ]
publicDir = "artifacts/growth-metrics/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25872"
BASE_PATH = "/"
